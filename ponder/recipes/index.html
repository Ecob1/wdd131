<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="recipes.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <header class="header">
      <img
        src="images/recipe-book-icon.png"
        alt="Recipe Book Logo"
        class="logo" />
      <h1 class="balthazar-regular">RecipeBook</h1>
    </header>
    <div class="search">
      <input type="text" placeholder="Find a recipe" />
      <img src="images/Search_Icon.png" alt="search icon" class="search-icon" />
    </div>
    <section class="recipe-card">
      <img
        src="images/apple-crisp.jpg"
        alt="Apple Crisp"
        class="recipe-image" />

      <div class="recipe-info">
        <p class="tag">dessert</p>
        <h2 class="balthazar-regular">Apple Crisp</h2>

        <div class="stars">★★★★☆</div>

        <p class="description">
          This apple crisp recipe is a simple yet delicious fall dessert that’s
          great served warm with vanilla ice cream.
        </p>
      </div>
    </section>

    <footer>
      <div class="social">
        <a href="#"
          ><img src="images/Instagram_Icon.png" alt="instagram icon"
        /></a>
        <a href="#"><img src="images/Youtube_icon.png" alt="youtube icon" /></a>
        <a href="#"
          ><img src="images/Pinterest_Icon.png" alt="pinterest icon"
        /></a>
      </div>

      <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
        Recipe icons created by Freepik - Flaticon
      </a>
    </footer>
  </body>
</html>
